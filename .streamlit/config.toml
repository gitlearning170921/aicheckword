# Streamlit 配置，减轻 Cursor/本机内存占用（降低 OOM 概率）
# 详见 https://docs.streamlit.io/develop/concepts/configuration

[server]
# 默认不设置 address，本机请用 http://localhost:8501 打开（勿用 http://0.0.0.0:8501，浏览器无法访问）。
# 需局域网/其他电脑访问时，请用根目录 start-lan.bat 启动（会监听 0.0.0.0）。
# 单次上传文件总大小上限（MB），避免一次加载过大文件导致 OOM
maxUploadSize = 200
# 最大请求体大小（MB）
maxMessageSize = 200
# 部分旧版 Streamlit 曾有 server.disconnectedSessionTTL（断线后会话保留秒数）；新版本可能已移除或改名。
# 若 streamlit config show 报错「不是有效配置项」，请删除本段自定义。切标签导致重连属浏览器+WebSocket 常见行为，见 docs/review-quality.md。

[browser]
# 不自动打开浏览器（在 Cursor 内运行时无需）
gatherUsageStats = false

[runner]
# false：降低「整页重跑」频率，查看/编辑审核报告时不易因连锁 rerun 丢失焦点或中断操作。
# true：交互更跟手，但在大量 widget（报告内多行 text_area）时易出现频繁重刷感。
fastReruns = false
# 浏览器控制台若大量报错：Cannot read properties of undefined (reading 'firstElementChild')（与 addResizeListener/滚动、
# WebSocket 增量更新有关，多见于 st.data_editor）：可在启动前设置环境变量 AICHECKWORD_DISABLE_DATA_EDITOR=1，
# 历史报告审核点改为分页表单；或升级 Streamlit / 换 Chrome 正式版并关闭冲突扩展。
